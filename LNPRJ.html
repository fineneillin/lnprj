<title>LNPRJ</title>
<link href="./LNPRJ_files/css2" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
:root {
  --bg: #090a09;
  --fg: #e5e1d8;
  --muted: #52504a;
  --dimmer: #28261f;
  --line: rgba(229,225,216,.09);
  --hover-bg: rgba(229,225,216,.04);
  --mono: 'Space Mono', 'Courier New', monospace;
  --serif: 'Noto Serif SC', 'Songti SC', Georgia, serif;
}
 
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--fg);
}
 
body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  font-family: var(--mono);
}
 
/* ── Top bar ── */
.topbar {
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2.4rem 4rem;
}
.brand {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .24em;
  color: var(--fg);
  text-decoration: none;
}
.year {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .14em;
}
 
/* ── Main: ghost + project list ── */
.main {
  flex: 1;
  min-height: 0;
  position: relative;
  display: flex;
  align-items: flex-end;
  padding: 0 4rem 3.5rem;
}
 
.ghost {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -58%);
  font-family: var(--serif);
  font-size: clamp(88px, 17vw, 210px);
  font-weight: 300;
  color: rgba(229,225,216,.038);
  line-height: 1;
  letter-spacing: .06em;
  user-select: none;
  pointer-events: none;
  white-space: nowrap;
}
 
.project-list {
  width: 100%;
  max-width: 680px;
}
 
.list-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 1rem;
  margin-bottom: 0;
  border-bottom: .5px solid var(--line);
}
.list-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: .2em;
  text-transform: uppercase;
}
 
.project {
  display: grid;
  grid-template-columns: 52px 1fr auto;
  align-items: center;
  gap: .8rem 1.4rem;
  padding: 1.05rem 0 1.05rem 1rem;
  text-decoration: none;
  color: inherit;
  border-left: 1px solid transparent;
  border-bottom: .5px solid var(--line);
  transition: border-left-color .22s, background .22s;
  position: relative;
}
.project:hover {
  border-left-color: rgba(229,225,216,.3);
  background: var(--hover-bg);
}
 
.proj-num {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .1em;
  font-family: var(--mono);
}
.proj-zh {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 300;
  color: var(--fg);
  letter-spacing: .02em;
}
.proj-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .2rem;
}
.proj-en {
  font-size: 9.5px;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
}
.proj-arrow {
  font-size: 11px;
  color: var(--muted);
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity .2s, transform .2s;
}
.project:hover .proj-arrow { opacity: 1; transform: translateX(0); }
 
/* Load animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.list-meta    { animation: fadeUp .5s ease both; animation-delay: .1s; }
.project:nth-child(2) { animation: fadeUp .5s ease both; animation-delay: .22s; }
.project:nth-child(3) { animation: fadeUp .5s ease both; animation-delay: .36s; }
.project:nth-child(4) { animation: fadeUp .5s ease both; animation-delay: .5s; }
.project:nth-child(5) { animation: fadeUp .5s ease both; animation-delay: .64s; }
 
/* ── Footer ── */
footer {
  flex-shrink: 0;
  padding: 1.3rem 4rem;
  border-top: .5px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
footer span {
  font-size: 9.5px;
  color: var(--dimmer);
  letter-spacing: .14em;
}
 
/* ── Responsive ── */
@media (max-width: 600px) {
  .topbar, .main, footer { padding-left: 1.8rem; padding-right: 1.8rem; }
  .proj-en { display: none; }
}
</style>
</head>
<body>

  <div class="project-list">

      <span class="proj-meta">
        <span class="proj-en">Japanese Grammar Analyzer</span>
        <span class="proj-arrow">→</span>
      </span>
    </a>
 
    <a class="project" href="https://ganyu.neillin-lct.workers.dev/" target="_blank" rel="noopener">
      <span class="proj-num">02</span>
      <span class="proj-zh">趕魚</span>
      <span class="proj-meta">

        <span class="proj-arrow">→</span>
      </span>
    </a>
 
    <a class="project" href="https://ai-workflow-demo.neillin-lct.workers.dev/" target="_blank" rel="noopener">
      <span class="proj-num">03</span>

      <span class="proj-meta">
        <span class="proj-en">ai-workflow</span>

    </a>

  </div>
</main>
