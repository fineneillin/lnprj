<script>
fetch('/projects.json')
  .then(r => r.json())
  .then(projects => {
    const list = document.querySelector('.project-list');
    projects.forEach((p, i) => {
      const a = document.createElement('a');
      a.className = 'project';
      a.href = p.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.style.animationDelay = `${0.22 + i * 0.14}s`;
      a.innerHTML = `
        <span class="proj-num">${p.id}</span>
        <span class="proj-zh">${p.title}</span>
        <span class="proj-meta">
          <span class="proj-en">${p.en}</span>
          <span class="proj-arrow">→</span>
        </span>`;
      list.appendChild(a);
    });
  })
  .catch(() => {
    // fallback: show a static note
    const list = document.querySelector('.project-list');
    const msg = document.createElement('p');
    msg.style.cssText = 'font-size:11px;color:#52504a;padding:1rem 0;';
    msg.textContent = '— 載入中 —';
    list.appendChild(msg);
  });
</script>
